{% extends "base.html" %}

{% block header_title %}Calendar{% endblock %}

{% block content %}
<div x-data="schedulerApp()">

    <!-- Filters bar -->
    <div class="mb-6 flex flex-wrap items-center gap-3">
        {% if filtered_post %}
        <div class="flex items-center gap-2 rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-1.5 text-sm text-indigo-700">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/>
            </svg>
            <span class="font-medium">Filtered:</span>
            <a href="{% url 'scheduler:scheduler' %}"
               up-follow
               class="ml-1 inline-flex items-center gap-1 rounded-md bg-indigo-100 px-2 py-0.5 text-xs font-medium text-indigo-600 hover:bg-indigo-200 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="size-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
                Clear filter
            </a>
        </div>
        {% else %}
        <select x-model="platformFilter" @change="refetch()"
                class="select select-bordered select-sm min-w-[140px] bg-white text-sm">
            <option value="">All Platforms</option>
            {% for p in platforms %}
            <option value="{{ p.key }}">{{ p.label }}</option>
            {% endfor %}
        </select>
        <select x-model="statusFilter" @change="refetch()"
                class="select select-bordered select-sm min-w-[130px] bg-white text-sm">
            <option value="">All Statuses</option>
            {% for key, label in status_choices %}
            <option value="{{ key }}">{{ label }}</option>
            {% endfor %}
        </select>
        {% endif %}
    </div>

    <!-- Calendar -->
    <div id="scheduler-calendar" class="scheduler-calendar"
         data-events-url="{% url 'scheduler:scheduler_events' %}"
         data-timezone="{{ project_timezone }}"
         {% if filtered_post %}
         data-post-filter="{{ filtered_post.pk }}"
         data-post-date="{{ filtered_post.scheduled_at|date:'c'|default:'' }}"
         {% endif %}></div>
</div>
{% endblock %}
