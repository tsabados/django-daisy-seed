<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/src/output.css' %}">
    <title>{% block title %}My amazing site{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/unpoly@3.12.1/unpoly.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/unpoly@3.12.1/unpoly.min.css"> 

    <script>
    up.status.config.currentClasses.push('menu-active');
    </script>
</head>

<body class="bg-gray-50">
    <div class="drawer lg:drawer-open">
    <input id="my-drawer-4" type="checkbox" class="drawer-toggle" />
    <div class="drawer-content" up-main>
        <!-- Navbar -->
        <nav class="navbar w-full bg-base-300">
        <label for="my-drawer-4" aria-label="open sidebar" class="btn btn-square btn-ghost">
            <!-- Sidebar toggle icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4"><path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"></path><path d="M9 4v16"></path><path d="M14 10l2 2l-2 2"></path></svg>
        </label>
        <div class="px-4">Navbar Title</div>
        </nav>
        <!-- Page content here -->
        {% block content %}{% endblock %}
    </div>

    <div class="drawer-side is-drawer-close:overflow-visible">
        <label for="my-drawer-4" aria-label="close sidebar" class="drawer-overlay"></label>
        <div class="flex min-h-full flex-col items-start bg-base-200 is-drawer-close:w-14 is-drawer-open:w-64">
        <!-- Sidebar content here -->
        <ul class="menu w-60 grow">
            <li>
                <a href="/" up-nav up-follow class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Home">
                    <span class="is-drawer-close:hidden">Home</span>
                </a>
            </li>
            <li>
                <a href="/settings" up-nav up-follow class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Settings">
                    <span class="is-drawer-close:hidden">Settings</span>
                </a>
            </li>

            <li>
                <a href="/about" up-nav up-follow class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="About">
                    <span class="is-drawer-close:hidden">About</span>
                </a>
            </li>
        </ul>
        </div>
    </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
